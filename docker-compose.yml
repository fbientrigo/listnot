# PUCV server (pilot) profile: PostgreSQL + API + dashboard (docs/DEPLOYMENT.md §2).
# The HMAC secret is injected from the environment — never baked into the image.
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: pucv
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
      POSTGRES_DB: pucv
    volumes:
      - pucv_db:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  api:
    build: .
    command: uvicorn apps.api.main:app --host 0.0.0.0 --port 8000
    environment:
      PUCV_AQ_ENV: server
      PUCV_DEMO_MODE: "false"
      DATABASE_URL: postgresql+psycopg://pucv:${POSTGRES_PASSWORD:-change_me}@db:5432/pucv
      PUCV_ID_SECRET_V1: ${PUCV_ID_SECRET_V1:?set PUCV_ID_SECRET_V1 in the environment}
      PUCV_MIN_GROUP_SIZE: "10"
    depends_on:
      - db
    ports:
      - "8000:8000"

  dashboard:
    build: .
    command: streamlit run apps/dashboard/app.py --server.address 0.0.0.0 --server.port 8501
    environment:
      PUCV_AQ_ENV: server
      DATABASE_URL: postgresql+psycopg://pucv:${POSTGRES_PASSWORD:-change_me}@db:5432/pucv
      PUCV_ID_SECRET_V1: ${PUCV_ID_SECRET_V1:?set PUCV_ID_SECRET_V1 in the environment}
    depends_on:
      - db
    ports:
      - "8501:8501"

volumes:
  pucv_db:
